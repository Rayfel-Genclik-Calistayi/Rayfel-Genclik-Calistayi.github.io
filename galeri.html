<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Rayfel Öğrenci Çalıştayı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #FFFFFF;
            background-color: #0A0A0A;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #8B0000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #DC143C;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #DC143C;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Gallery Section */
        .gallery-section {
            padding: 120px 0 80px;
            min-height: 100vh;
        }

        .section-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 4rem;
            color: #FFFFFF;
            text-shadow: 0 0 20px rgba(220, 20, 60, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            height: 300px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(220, 20, 60, 0.1);
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 25px 60px rgba(220, 20, 60, 0.4);
            border-color: #DC143C;
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.9), rgba(139, 0, 0, 0.8));
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Rayfel Öğrenci Çalıştayı</div>
        <ul class="nav-links">
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="galeri.html">Galeri</a></li>
            <li><a href="basvuru.html">Başvuru</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
    </nav>

    <!-- Gallery -->
    <section class="gallery-section">
        <div class="container">
            <h1 class="section-title">Galeri</h1>
            <div class="gallery-grid">

                    <div class="gallery-overlay">a ekibi</div>
                </div>
                <div class="gallery-item" style="background-image: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <div class="gallery-overlay">b ekibi</div>
                </div>
                <div class="gallery-item" style="background-image: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <div class="gallery-overlay">c ekibi</div>
                </div>
                <div class="gallery-item" style="background-image: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                    <div class="gallery-overlay">d ekibi</div>
                </div>
