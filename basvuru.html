<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başvuru - Rayfel Gençlik Çalıştayı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #FFFFFF;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A0000 100%);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #8B0000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #DC143C;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #DC143C;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Section */
        .section {
            padding: 140px 0 80px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 4rem 3rem;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(220, 20, 60, 0.3);
            backdrop-filter: blur(20px);
            text-align: center;
            transition: all 0.3s ease;
        }

        .app-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 80px rgba(220, 20, 60, 0.3);
            border-color: #DC143C;
        }

        .app-card h1 {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #DC143C, #FFFFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .app-card p {
            font-size: 1.3rem;
            color: #CCCCCC;
            margin-bottom: 3rem;
            line-height: 1.8;
        }

        .cta-button {
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 16px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 15px 40px rgba(220, 20, 60, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(220, 20, 60, 0.6);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-card {
                padding: 2.5rem 2rem;
                margin: 0 1rem;
            }
            
            .app-card h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Rayfel Gençlik Çalıştayı</div>
        <ul class="nav-links">
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="galeri.html">Galeri</a></li>
            <li><a href="basvuru.html">Başvuru</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
    </nav>

    <!-- Başvuru Section -->
    <section class="section">
        <div class="container">
            <div class="app-card">
                <h1>Başvuru</h1>
                <p>Siz de  katılımcılar arasında yer almak ve unutulmaz bir deneyim yaşamak için formu doldurun.</p>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSepKicYbXODFg8FHzTDrQ1TMxyr0CU747eWPFCK02Jo5LNMGw/viewform?usp=dialog" target="_blank" class="cta-button">
                    Başvuru Formuna Git →
                </a>
            </div>
        </div>
    </section>
</body>
</html>
