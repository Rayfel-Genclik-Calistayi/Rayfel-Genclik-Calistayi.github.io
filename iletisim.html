<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim - Rayfel Gençlik Çalıştayı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #FFFFFF;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A0000 100%);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #8B0000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #DC143C;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #DC143C;
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 5%;
        }

        /* Section */
        .section {
            padding: 140px 0 80px;
            min-height: 100vh;
        }

        .section-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 4rem;
            background: linear-gradient(135deg, #DC143C, #FFFFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .contact-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid rgba(220, 20, 60, 0.2);
            transition: all 0.3s ease;
        }

        .contact-item:hover {
            border-color: #DC143C;
            box-shadow: 0 15px 40px rgba(220, 20, 60, 0.2);
        }

        .contact-item h3 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #DC143C;
        }

        .contact-item a {
            color: #CCCCCC;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .contact-item a:hover {
            color: #DC143C;
        }

        .contact-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(220, 20, 60, 0.3);
            backdrop-filter: blur(20px);
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1.2rem;
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: #FFFFFF;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999999;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #DC143C;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        .submit-btn {
            background: linear-gradient(135deg, #DC143C, #8B0000);
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(220, 20, 60, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-content {
                grid-template-columns: 1fr;
                gap: 3rem;
            }
            
            .section-title {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">Rayfel Gençlik Çalıştayı</div>
        <ul class="nav-links">
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="galeri.html">Komitelerimiz</a></li>
            <li><a href="iletisim.html">İletişim</a></li>
        </ul>
    </nav>

    <!-- İletişim Section -->
    <section class="section">
        <div class="container">
            <h1 class="section-title">İletişim</h1>
            <div class="contact-content">
                <div class="contact-info">
                    <div class="contact-item">
                        <h3>📧 E-posta</h3>
                        <p><a href="mailto:rayfelgckadro@gmail.com">rayfelgckadro@gmail.com</a></p>
                    </div>
                    <div class="contact-item">
                        <h3>TikTok</h3>
                        <p><a href="https://www.tiktok.com/@rayfelgc" target="_blank">@rayfelgc</a></p>
                    </div>
                    <div class="contact-item">
                        <h3>📱 Instagram</h3>
                        <p><a href="https://www.instagram.com/rayfelgc?igsh=MWIzazJvcWZocTdueA==" target="_blank">@rayfelgc</a></p>
                    </div>
                </div>
                <form class="contact-form" action="mailto:rayfelgckadro@gmail.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label>Ad Soyad</label>
                        <input type="text" name="name" placeholder="Adınızı ve soyadınızı yazın" required>
                    </div>
                    <div class="form-group">
                        <label>E-posta</label>
                        <input type="email" name="email" placeholder="email@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Mesaj</label>
                        <textarea name="message" rows="6" placeholder="Mesajınızı buraya yazın..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Mesaj Gönder</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
